[tool:pytest]
# Pytest configuration for drone controller tests

# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output formatting
addopts = 
    -v
    --tb=short
    --strict-markers
    --strict-config
    --color=yes
    --durations=10

# Test markers
markers =
    unit: Unit tests for individual components
    integration: Integration tests for complete workflows  
    slow: Tests that take longer than 1 second
    hardware: Tests that require actual hardware (should be mocked)
    pid: Tests related to PID controller functionality
    communication: Tests related to XBee communication
    sensor: Tests related to ultrasonic sensor
    mavlink: Tests related to MAVLink protocol
    flight: Tests related to flight operations
    safety: Tests related to safety and error handling

# Minimum test coverage
minversion = 6.0

# Test timeout (seconds)
timeout = 300

# Logging
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(name)s: %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore:.*unclosed.*:ResourceWarning